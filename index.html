<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<title>MonsterA! — grow your own monstera</title>
	<meta name="description" content="A clicker game: tap to grow your monstera, earn gold, and unlock the horror path.">
	<meta name="theme-color" content="#2f9e6d">

	<!-- Open Graph / social. Replace the domain below with your real Vercel URL. -->
	<meta property="og:type" content="website" />
	<meta property="og:site_name" content="MonsterA!" />
	<meta property="og:url" content="https://monstera-clicker.vercel.app/" />
	<meta property="og:title" content="GrowUp Your Own MONSTER'a!" />
	<meta property="og:description" content="Click and fill your plant — grow it, feed it, see what happens." />
	<meta property="og:image" content="https://monstera-clicker.vercel.app/assets/images/og.jpg" />
	<meta property="og:image:width" content="1539" />
	<meta property="og:image:height" content="688" />
	<meta property="og:image:alt" content="MonsterA! clicker game" />

	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="GrowUp Your Own MONSTER'a!" />
	<meta name="twitter:description" content="Click and fill your plant — grow it, feed it, see what happens." />
	<meta name="twitter:image" content="https://monstera-clicker.vercel.app/assets/images/og.jpg" />

	<link rel="stylesheet" href="src/styles/main.css">
	<link rel="stylesheet" href="src/styles/inkdrops.css">
	<link rel="icon" href="/assets/images/fav.png" type="image/png">
</head>
<body>
	<div class="modal" id="modal" hidden>
		<div class="modal__backdrop" data-modal-close></div>
		<div class="modal__panel" id="modal_panel" role="dialog" aria-modal="true" aria-labelledby="modal_title">
			<header class="modal__header">
				<span class="modal__title" id="modal_title"></span>
				<button type="button" class="modal__close" id="modal_close" data-modal-close aria-label="Close">x</button>
			</header>
			<div class="modal__body" id="modal_body"></div>
			<footer class="modal__footer" id="modal_footer"></footer>
		</div>
	</div>
	<div class="isolation" id="isolation">
		<div class="progress" id="progress"></div>
		<div class="money" id="money">
			<div class="money_wrap">
				<div class="money_txt" id="money_txt">1</div>
			</div>
		</div>
		<div class="store" id="btnStore"></div>
	</div>
	<!-- <p id="test"></p> -->
	<div class="wrap" id="wrap">
		<div class="forSoil" id="soil">0%</div>
		<div class="forScore">
			<div class="section section1" id="label">
				Grow your <b>Monstera</b>
				<div class="new" id="showDevlog">?</div>
			</div>
			<div class="section section2 " id="scoreD"> </div>
			<div class="section section3" id="name" data-ripple></div>
			<div class="section section4" id="currentApp"></div>
		</div>
		<div class="forPlay">
			<div class="canvas">
				<div class="block inkMe" ink-color="#57dbeb" id="block">
					<img src="/assets/images/0a.png" alt="monstera stage 0" id="plant">
					<div class="spider" id="spider"></div>
				</div>
			</div>
		</div>

		<div class="forNav">
			<div class="btn" id="show_stat">stats window</div>
			<div class="btn" id="refresh"><span id="re">re</span>start</div>
			</div>
	</div>
	<script type="module" src="src/scripts/main.js"></script>
</body>
</html>
